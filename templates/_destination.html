<article class="destination-card">
  <div class="destination-head">
    <label>Nombre receptor/destino<input class="form-control" name="destination_name[]" value="{{ destination.get('name', '') }}" /></label>
    <label>Tipo<select class="form-select receiver-type" name="receiver_type[]"><option value="vessel" {% if destination.get('receiver_type') == 'vessel' %}selected{% endif %}>Buque receptor</option><option value="shore" {% if destination.get('receiver_type') == 'shore' %}selected{% endif %}>Tanque terrestre</option></select></label>
    <label>Puerto<input class="form-control" name="destination_port[]" value="{{ destination.get('port', '') }}" /></label>
    <button class="btn btn-outline-danger remove-destination" type="button" aria-label="Eliminar destino">Eliminar</button>
  </div>
  <div class="form-grid cols-4 mt-3">
    <label>Ullage inicial / GOV bbl<input class="form-control" name="initial_gov_bbl[]" type="number" min="0" step="0.001" value="{{ destination.get('initial_gov_bbl', 0) }}" /></label>
    <label>Ullage final / GOV bbl<input class="form-control" name="final_gov_bbl[]" type="number" min="0" step="0.001" value="{{ destination.get('final_gov_bbl', 0) }}" /></label>
    <label>Temperatura °F<input class="form-control" name="destination_temperature_f[]" type="number" step="0.1" value="{{ destination.get('temperature_f', 60) }}" /></label>
    <label>API<input class="form-control" name="destination_api[]" type="number" min="-10" max="100" step="0.01" value="{{ destination.get('api', 35) }}" /></label>
    <label>BS&W %<input class="form-control" name="destination_bsw_pct[]" type="number" min="0" max="100" step="0.001" value="{{ destination.get('bsw_pct', 0) }}" /></label>
    <label class="vef-field">VEF<input class="form-control" name="destination_vef[]" type="number" min="0.8" max="1.2" step="0.000001" value="{{ destination.get('vef', 1) }}" /></label>
    <label class="shore-field">Ajuste de linea bbl<input class="form-control" name="line_adjustment_bbl[]" type="number" step="0.001" value="{{ destination.get('line_adjustment_bbl', 0) }}" /></label>
  </div>
</article>
